<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股技術分析儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-0: #0a0e14; --bg-1: #0f1419; --bg-2: #131922; --bg-3: #1a2230;
  --border: #1f2937; --border-light: #2a3548;
  --text-0: #e4e7eb; --text-1: #9ca3af; --text-2: #6b7280; --text-3: #4b5563;
  --up: #ef4444; --up-bg: rgba(239,68,68,.12);
  --dn: #10b981; --dn-bg: rgba(16,185,129,.12);
  --gold: #fbbf24; --blue: #3b82f6; --purple: #a78bfa; --teal: #14b8a6; --pink: #ec4899;
}
body {
  font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-0); color: var(--text-0);
  min-height: 100vh; font-size: 13px; line-height: 1.5;
}
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px; background: var(--bg-1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.brand { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
.brand h1 { font-size: 14px; font-weight: 600; color: var(--text-0); letter-spacing: .3px; }
.brand p { font-size: 11px; color: var(--text-2); margin-top: 2px; }

.search-box { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.search-input {
  width: 100%; background: var(--bg-2); border: 1px solid var(--border-light);
  color: var(--text-0); padding: 8px 12px; border-radius: 6px;
  font-size: 14px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text-3); letter-spacing: 0; }
.search-hint { font-size: 10px; color: var(--text-2); margin-top: 6px; }

.watchlist { flex: 1; overflow-y: auto; padding: 10px 0; }
.watchlist-header {
  font-size: 10px; color: var(--text-2); text-transform: uppercase;
  letter-spacing: 1px; padding: 6px 18px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.watchlist-header .actions { display: flex; gap: 4px; }
.watchlist-header button {
  background: none; border: none; color: var(--text-2); cursor: pointer;
  font-size: 16px; padding: 0 4px; line-height: 1; transition: color .12s;
}
.watchlist-header button:hover { color: var(--blue); }
.watchlist-empty {
  font-size: 11px; color: var(--text-3);
  padding: 20px 18px; text-align: center; line-height: 1.6;
}

.stock-item {
  display: flex; align-items: center; padding: 9px 18px;
  cursor: pointer; border-left: 2px solid transparent;
  transition: all .12s; position: relative;
}
.stock-item:hover { background: var(--bg-2); }
.stock-item.active { background: var(--bg-2); border-left-color: var(--blue); }
.stock-info { flex: 1; min-width: 0; }
.stock-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--text-0);
}
.stock-name {
  font-size: 11px; color: var(--text-1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.stock-price { text-align: right; font-family: 'JetBrains Mono', monospace; }
.stock-price-val { font-size: 12px; font-weight: 600; }
.stock-price-chg { font-size: 10px; }
.stock-price.up .stock-price-val,
.stock-price.up .stock-price-chg { color: var(--up); }
.stock-price.dn .stock-price-val,
.stock-price.dn .stock-price-chg { color: var(--dn); }
.stock-price.loading { color: var(--text-3); }

.stock-delete {
  display: none;
  background: none; border: none; color: var(--text-3);
  font-size: 14px; cursor: pointer;
  margin-left: 6px; padding: 4px 6px;
  border-radius: 4px; line-height: 1;
}
.stock-item:hover .stock-delete { display: block; }
.stock-item:hover .stock-price { display: none; }
.stock-delete:hover { color: var(--up); background: var(--up-bg); }

.sidebar-footer { padding: 10px 18px; border-top: 1px solid var(--border); }
.sidebar-footer a {
  color: var(--text-2); font-size: 11px; text-decoration: none;
  display: block; padding: 4px 0; cursor: pointer;
}
.sidebar-footer a:hover { color: var(--text-0); }

.main { flex: 1; overflow-x: hidden; padding: 16px 20px; }
.empty-state {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; color: var(--text-2); font-size: 14px;
}

.stock-header {
  display: flex; align-items: flex-end; gap: 24px;
  margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.stock-title h2 {
  font-size: 22px; font-weight: 600; color: var(--text-0);
  display: flex; align-items: baseline; gap: 10px;
}
.stock-title h2 .code {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-1); font-size: 16px; font-weight: 500;
}
.stock-title p { font-size: 11px; color: var(--text-2); margin-top: 4px; }
.add-to-watchlist {
  margin-left: 12px; background: var(--bg-2);
  border: 1px solid var(--border-light); color: var(--text-1);
  padding: 4px 10px; border-radius: 4px;
  font-size: 11px; cursor: pointer; font-family: inherit;
}
.add-to-watchlist:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
.add-to-watchlist.added { background: var(--dn-bg); color: var(--dn); border-color: var(--dn); cursor: default; }

.price-display { display: flex; align-items: baseline; gap: 12px; margin-left: auto; }
.price-display .price {
  font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
}
.price-display .change { font-size: 14px; font-weight: 600; }
.price-display.up .price, .price-display.up .change { color: var(--up); }
.price-display.dn .price, .price-display.dn .change { color: var(--dn); }

.stats-row {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 10px; margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
}
.stat-label {
  font-size: 10px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600; color: var(--text-0);
}
.stat-value.up { color: var(--up); }
.stat-value.dn { color: var(--dn); }
.stat-value.gold { color: var(--gold); }
.stat-value.blue { color: var(--blue); }
.stat-value.purple { color: var(--purple); }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.full-row { grid-column: 1 / -1; }
@media (max-width: 1280px) {
  .stats-row { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 1fr; }
}

.panel {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 16px; margin-bottom: 14px;
}
.panel-title {
  font-size: 11px; color: var(--text-1);
  text-transform: uppercase; letter-spacing: 1px;
  font-weight: 600; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-title .badge {
  font-size: 10px; background: var(--bg-3); color: var(--text-1);
  padding: 2px 7px; border-radius: 10px; font-weight: 500; letter-spacing: 0;
}

.chart-container { height: 360px; background: var(--bg-1); border-radius: 4px; }
.chart-toolbar { display: flex; gap: 6px; margin-bottom: 10px; }
.chart-toolbar button {
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-1); padding: 4px 11px;
  border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit;
}
.chart-toolbar button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.chart-toolbar button:hover:not(.active) { background: var(--bg-3); color: var(--text-0); }

.indicator-table { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.indicator-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px;
}
.indicator-row:nth-last-child(-n+2) { border-bottom: none; }
.indicator-row .label { color: var(--text-1); }
.indicator-row .value { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

.signal-badge {
  display: inline-block; font-size: 11px; padding: 3px 9px;
  border-radius: 4px; font-weight: 500;
}
.signal-bull { background: var(--up-bg); color: var(--up); }
.signal-bear { background: var(--dn-bg); color: var(--dn); }
.signal-neutral { background: rgba(251,191,36,.15); color: var(--gold); }

.ai-panel {
  background: linear-gradient(135deg, rgba(59,130,246,.05) 0%, rgba(167,139,250,.05) 100%);
  border: 1px solid var(--border-light);
}
.ai-gauge { position: relative; width: 180px; height: 100px; margin: 0 auto 6px; }
.ai-gauge canvas { width: 100%; height: 100%; }
.ai-gauge-center {
  position: absolute; top: 60%; left: 50%;
  transform: translate(-50%, -50%); text-align: center;
}
.ai-gauge-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 700; line-height: 1;
}
.ai-gauge-label {
  font-size: 10px; color: var(--text-2);
  margin-top: 2px; text-transform: uppercase; letter-spacing: .5px;
}

.pattern-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 5px; padding: 12px 14px; margin-bottom: 10px;
}
.pattern-card:last-child { margin-bottom: 0; }
.pattern-card .name {
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
.pattern-card .desc { font-size: 12px; color: var(--text-1); line-height: 1.6; }

.signals-list { display: flex; flex-direction: column; gap: 6px; }
.signal-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; background: var(--bg-2); border-radius: 4px; font-size: 12px;
}
.signal-row .name { color: var(--text-0); }

.ai-text {
  background: var(--bg-2); border-left: 3px solid var(--blue);
  padding: 10px 14px; border-radius: 0 4px 4px 0;
  font-size: 12.5px; line-height: 1.7;
  color: var(--text-0); white-space: pre-wrap; min-height: 80px;
}
.ai-text.loading { color: var(--text-2); font-style: italic; }

.strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.strategy-box {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 5px; padding: 11px 13px;
}
.strategy-box .label {
  font-size: 10px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px;
}
.strategy-box .value {
  font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600;
}

.loading-state { text-align: center; padding: 60px 20px; color: var(--text-2); }
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border-light); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: var(--up-bg); border: 1px solid rgba(239,68,68,.3);
  color: var(--up); padding: 10px 14px;
  border-radius: 5px; font-size: 12px; margin-bottom: 14px;
}

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-1); border: 1px solid var(--border-light);
  border-radius: 8px; padding: 24px; width: 90%; max-width: 460px;
}
.modal h3 { font-size: 16px; margin-bottom: 6px; }
.modal p { font-size: 12px; color: var(--text-1); margin-bottom: 14px; line-height: 1.6; }
.modal label {
  font-size: 11px; color: var(--text-1);
  display: block; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .5px;
}
.modal input {
  width: 100%; background: var(--bg-2); border: 1px solid var(--border-light);
  color: var(--text-0); padding: 10px 12px; border-radius: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  outline: none; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--blue); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
  padding: 8px 18px; border-radius: 5px;
  border: 1px solid var(--border-light); background: var(--bg-2); color: var(--text-0);
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.modal-actions button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg-2); border: 1px solid var(--border-light);
  color: var(--text-0); padding: 10px 20px; border-radius: 6px;
  font-size: 13px; z-index: 200; opacity: 0;
  transition: opacity .25s, transform .25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--dn); color: var(--dn); }
.toast.error { border-color: var(--up); color: var(--up); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; max-height: 50vh; }
  .main { padding: 12px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stock-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .price-display { margin-left: 0; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>📊 台股技術分析</h1>
      <p>Yahoo Finance + Gemini AI</p>
    </div>

    <div class="search-box">
      <input id="searchInput" class="search-input" type="text" placeholder="輸入代號" maxlength="6" />
      <div class="search-hint">輸入代號後按 Enter 查詢任意股票</div>
    </div>

    <div class="watchlist">
      <div class="watchlist-header">
        <span>📌 監控清單</span>
        <div class="actions">
          <button id="addStockBtn" title="新增股票">＋</button>
          <button id="refreshAllBtn" title="重新整理">↻</button>
        </div>
      </div>
      <div id="watchlistContainer"></div>
    </div>

    <div class="sidebar-footer">
      <a id="settingsLink">⚙ 設定 API Key</a>
      <a id="aboutLink" style="font-size:10px;color:var(--text-3);">v1.3 · 資料延遲約15分鐘</a>
    </div>
  </aside>

  <main class="main">
    <div id="mainContent">
      <div class="empty-state">
        ← 左側選擇股票，或在搜尋框輸入代號
      </div>
    </div>
  </main>
</div>

<!-- API Key Modal -->
<div id="apiKeyModal" class="modal-overlay">
  <div class="modal">
    <h3>🔑 設定 API Key（免費）</h3>
    <p>
      用於 AI 趨勢分析。Key 只存在你的瀏覽器，不會傳到任何伺服器。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--blue);">點此取得免費 API Key →</a>
    </p>
    <label>Gemini API Key（AIza...）</label>
    <input id="apiKeyInput" type="text" placeholder="AIzaSy..." spellcheck="false" />
    <label>FinMind Token（選填，啟用法人籌碼）</label>
    <input id="finmindTokenInput" type="text" placeholder="FinMind API Token" spellcheck="false" />
    <label>FinMind Proxy URL（選填，解決 GitHub Pages CORS）</label>
    <input id="finmindProxyInput" type="text" placeholder="https://your-worker.workers.dev" spellcheck="false" />
    <div class="modal-actions">
      <button id="apiKeyCancelBtn">略過（不使用 AI）</button>
      <button id="apiKeySaveBtn" class="primary">儲存</button>
    </div>
  </div>
</div>

<!-- Add Stock Modal -->
<div id="addStockModal" class="modal-overlay">
  <div class="modal">
    <h3>➕ 新增股票到監控清單</h3>
    <p>輸入股票代號和名稱（名稱可選填，系統會自動嘗試上市/上櫃）。</p>
    <label>股票代號 *</label>
    <input id="addStockCode" type="text" placeholder="例如：2330" maxlength="6" spellcheck="false" />
    <label>股票名稱（選填）</label>
    <input id="addStockName" type="text" placeholder="例如：台積電" maxlength="20" spellcheck="false" />
    <div class="modal-actions">
      <button id="addStockCancelBtn">取消</button>
      <button id="addStockSaveBtn" class="primary">新增</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="stock-dashboard.js?v=20260514-6"></script>

</body>
</html>
